哦!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 2026釜山旅費紀錄</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');


body{
    font-family:'Noto Sans TC',sans-serif;
    background:#EAE6DF;
}


.travel-book{
    background:white;
    border-radius:24px;
    box-shadow:0 20px 45px rgba(50,45,40,.12);
}


.soft-card{
    background:white;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(50,45,40,.08);
}


.input-style{

    width:100%;
    margin-top:8px;
    padding:14px;
    background:#faf8f4;
    border-radius:14px;
    border:none;
    outline:none;

}


.input-style:focus{
    box-shadow:0 0 0 2px #d6cfc5;
}



.pay-btn{

    padding:14px;
    border-radius:14px;
    background:#f3f0eb;
    font-weight:700;

}


.selected{

    background:#292524;
    color:white;

}



.expense-card{

    background:#faf8f4;
    border-radius:18px;
    padding:18px;

}



.action-btn{

    font-size:13px;
    padding:6px 12px;
    border-radius:10px;
    background:#eee9e1;
    font-weight:bold;

}


</style>


</head>


<body class="text-stone-800 p-3 md:p-8">


<div class="max-w-4xl mx-auto travel-book min-h-screen">


<header class="bg-stone-100 py-10 text-center rounded-t-[24px]">

<h1 class="text-3xl font-black">

💰 2026釜山旅費紀錄

</h1>


<p class="text-sm text-stone-500 mt-2">

Busan Travel Expenses

</p>


</header>



<main class="p-6 md:p-10">


<section class="soft-card p-6 mb-6">


<h2 class="text-xl font-black mb-4">

💱 匯率設定

</h2>


<div class="flex gap-3">


<input

id="exchangeRate"

type="number"

step="0.1"

value="46"

class="input-style">

<p class="text-xs text-stone-400 mt-2">

🇹🇼 NT$1 = ₩多少韓元

</p>

<p
id="rateWarning"
class="hidden text-xs text-red-600 font-bold mt-2">

⚠️ 已修改匯率，記得按「儲存」才會套用到新的花費紀錄！

</p>


<button

onclick="saveRate()"

class="bg-stone-800 text-white px-5 rounded-xl font-bold">

儲存

</button>


</div>


</section>



<section class="soft-card p-6 mb-6">


<h2 class="text-xl font-black mb-5">

📊 旅費總計

</h2>


<div class="grid grid-cols-2 gap-4">


<div class="bg-stone-50 rounded-2xl p-5">

<p class="text-xs text-stone-500">

🇰🇷 韓幣總額

</p>

<p id="totalWon" class="text-xl font-black mt-2">

₩0

</p>


</div>


<div class="bg-stone-50 rounded-2xl p-5">

<p class="text-xs text-stone-500">

🇹🇼 台幣約

</p>

<p id="totalTwd" class="text-xl font-black mt-2">

NT$0

</p>


</div>


</div>


</section>



<section class="soft-card p-6">


<h2 id="formTitle" class="text-xl font-black mb-5">

➕ 新增花費

</h2>


<input type="hidden" id="editId">



<div class="space-y-5">


<div>

<label class="font-bold text-sm">📅 日期</label>

<input id="date" type="date" class="input-style">

</div>


<div>

<label class="font-bold text-sm">📝 項目</label>

<input id="item" type="text" placeholder="例如：機場接送" class="input-style">

</div>


<div>

<label class="font-bold text-sm">🇰🇷 韓幣金額</label>

<input id="won" type="number" class="input-style">

<p id="previewTwd" class="text-sm text-stone-500 mt-2">

約 NT$0（匯率：₩46 = NT$1）

</p>

<div class="mt-4">

<label class="font-bold text-sm">

💳 刷卡手續費（選填【等銀行出帳後填寫】）

</label>


<input

id="fee"

type="number"

placeholder="例如：20"

class="input-style">


</div>

</div>

<div>

<label class="font-bold text-sm">

💳 付款方式

</label>


<div class="grid grid-cols-2 gap-3 mt-2">


<button

id="cashBtn"

onclick="selectPayment('現金')"

class="pay-btn">

💵 現金

</button>



<button

id="cardBtn"

onclick="selectPayment('刷卡')"

class="pay-btn">

💳 刷卡

</button>


</div>

</div>




<div>

<label class="font-bold text-sm">

👤 付款人

</label>


<select id="person" class="input-style">

<option>阿翔</option>

<option>橘子</option>

<option>凱婷</option>

<option>蘇</option>

</select>


</div>


<div>

<label class="font-bold text-sm">
📝 備註（選填）
</label>

<input
id="note"
type="text"
placeholder="例如：四人平分、代墊、免稅商品..."
class="input-style">

</div>



<button

id="submitBtn"

onclick="saveExpense()"

class="w-full bg-stone-800 text-white rounded-2xl p-4 font-bold">


＋ 新增紀錄


</button>



<button

id="cancelBtn"

onclick="cancelEdit()"

class="hidden w-full bg-stone-200 text-stone-700 rounded-2xl p-4 font-bold mt-3">


取消編輯


</button>



</div>


</section>






<section class="soft-card p-6 mt-6">


<div class="flex justify-between items-center mb-5">

<h2 class="text-xl font-black">

📒 花費紀錄

</h2>


<button

onclick="exportExcel()"

class="bg-stone-800 text-white px-4 py-2 rounded-xl text-sm font-bold">

📥 匯出 Excel

</button>


</div>


<div id="expenseList" class="space-y-3">


<p class="text-stone-400 text-sm">

目前還沒有紀錄

</p>


</div>


</section>



</main>





<footer class="bg-stone-100 py-4 text-center text-xs text-stone-400 font-bold rounded-b-[24px]">


⚠️ 溫馨提醒‼️ 是免稅！不是免費！！！🌝


</footer>


</div>








<script>


let paymentMethod="";

let exchangeRate=46;



function formatNumber(num){

return Number(num).toLocaleString("zh-TW");

}




let savedRate =
localStorage.getItem("busanRate");


if(savedRate){

exchangeRate =
Number(savedRate);

}

document.getElementById("exchangeRate").value = exchangeRate;

document.getElementById("exchangeRate").addEventListener("input", () => {

const currentRate = Number(document.getElementById("exchangeRate").value);

if(currentRate !== exchangeRate){

document.getElementById("rateWarning").classList.remove("hidden");

}else{

document.getElementById("rateWarning").classList.add("hidden");

}

});





function saveRate(){

exchangeRate = Number(
document.getElementById("exchangeRate").value
);

localStorage.setItem(
"busanRate",
exchangeRate
);

// ⭐ 儲存後隱藏提醒
document.getElementById("rateWarning").classList.add("hidden");

// ⭐ 如果韓幣金額已經有輸入，同步更新下面的預估台幣
let won = Number(document.getElementById("won").value) || 0;

document.getElementById("previewTwd").innerText =
"約 NT$" + formatNumber(
Math.round(won / exchangeRate)
)
+"（匯率：₩"+exchangeRate+" = NT$1）";

loadExpenses();

}






function selectPayment(method){


paymentMethod=method;



cashBtn.classList.remove("selected");

cardBtn.classList.remove("selected");



if(method==="現金")

cashBtn.classList.add("selected");



if(method==="刷卡")

cardBtn.classList.add("selected");



}







document.getElementById("won")

.addEventListener("input",()=>{


let won =
Number(document.getElementById("won").value)||0;



previewTwd.innerText =

"約 NT$"+

formatNumber(

Math.round(won/exchangeRate)

)

+"（匯率：₩"+exchangeRate+" = NT$1）";


});







import("./firebase-config.js")

.then(async({db})=>{


window.db=db;



const {

collection,

addDoc,

getDocs,

doc,

updateDoc,

deleteDoc,

serverTimestamp

}=await import(

"https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js"

);



window.firebaseFns={

collection,

addDoc,

getDocs,

doc,

updateDoc,

deleteDoc,

serverTimestamp

};



loadExpenses();


});







async function saveExpense(){



let id =
document.getElementById("editId").value;



let feeAmount =
Number(document.getElementById("fee").value)||0;


let twdAmount =
Math.round(
Number(won.value)/exchangeRate
);



let data={

date: date.value,

item: item.value,

won: Number(won.value),

twd: twdAmount,

rate: exchangeRate,

fee: feeAmount,

totalTwd: twdAmount + feeAmount,

payment: paymentMethod,

person: person.value,

note: note.value

};




if(!data.item || !data.won){

alert("請輸入資料");

return;

}



if(!paymentMethod){

alert("請選付款方式");

return;

}


if(id){


await window.firebaseFns.updateDoc(

window.firebaseFns.doc(
window.db,
"expenses",
id
),

data

);


alert("修改完成");


}

else{


await window.firebaseFns.addDoc(

window.firebaseFns.collection(
window.db,
"expenses"
),

{

...data,

createdAt:
window.firebaseFns.serverTimestamp()

}

);


alert("新增完成");


}




clearForm();

loadExpenses();



}








function editExpense(data,id){



document.getElementById("editId").value=id;


document.getElementById("date").value=data.date;


document.getElementById("item").value=data.item;


document.getElementById("won").value=data.won;


document.getElementById("person").value=data.person;
document.getElementById("note").value = data.note || "";


paymentMethod=data.payment;



selectPayment(paymentMethod);



document.getElementById("formTitle").innerText=

"✏️ 編輯花費";


document.getElementById("submitBtn").innerText=

"更新紀錄";


document.getElementById("cancelBtn")

.classList.remove("hidden");



window.scrollTo({

top:0,

behavior:"smooth"

});


}







function cancelEdit(){


clearForm();


}





function clearForm(){


document.getElementById("editId").value="";


document.getElementById("item").value="";


document.getElementById("won").value="";
document.getElementById("note").value="";


document.getElementById("formTitle").innerText=

"➕ 新增花費";


document.getElementById("submitBtn").innerText=

"＋ 新增紀錄";


document.getElementById("cancelBtn")

.classList.add("hidden");


paymentMethod="";


cashBtn.classList.remove("selected");

cardBtn.classList.remove("selected");


}








async function deleteExpense(id){



if(!confirm("確定要刪除此筆旅費嗎？"))

return;



await window.firebaseFns.deleteDoc(

window.firebaseFns.doc(

window.db,

"expenses",

id

)

);



loadExpenses();



}







async function loadExpenses(){



const list =
document.getElementById("expenseList");



list.innerHTML="";



let totalWon=0;
let totalTwd=0;



let snapshot=

await window.firebaseFns.getDocs(

window.firebaseFns.collection(

window.db,

"expenses"

)

);




let arr=[];



snapshot.forEach((d)=>{


arr.push({

id:d.id,

...d.data()

});


});



arr.sort((a,b)=>{

if(!a.createdAt || !b.createdAt){

return 0;

}

return b.createdAt.seconds - a.createdAt.seconds;

});





arr.forEach((data)=>{


totalWon += Number(data.won);

totalTwd += Number(data.twd);



list.innerHTML +=



`

<div class="expense-card">


<div class="flex justify-between">


<div>

<p class="font-black text-lg">

${data.item}

</p>


<p class="text-sm text-stone-500">

📅 ${data.date}

</p>

${data.createdAt ?
`
<p class="text-xs text-stone-400">
🕒 ${new Date(data.createdAt.seconds * 1000).toLocaleString("zh-TW")}
</p>
`
:
""
}


</div>



<div class="text-right">


<p class="font-black">

₩${formatNumber(data.won)}

</p>


<p class="text-sm text-stone-500">

NT$${formatNumber(data.twd)}

<br>

匯率：₩${data.rate || 46} = NT$1

${data.fee ? 
`
<p class="text-sm text-stone-500">
💳 手續費 NT$${formatNumber(data.fee)}
</p>

<p class="text-sm font-bold">
實際 NT$${formatNumber(data.totalTwd || data.twd)}
</p>
`
:
""
}

</p>


</div>



</div>




<div class="mt-3 text-sm text-stone-600">

${data.payment}

｜👤 ${data.person}

${data.note ? 
`
<div class="mt-2 text-stone-500">
📝 ${data.note}
</div>
`
:
""
}

</div>




<div class="flex gap-2 mt-4">


<button

onclick='editExpense(${JSON.stringify(data)}, "${data.id}")'

class="action-btn">

✏️ 編輯

</button>



<button

onclick="deleteExpense('${data.id}')"

class="action-btn">

🗑 刪除

</button>



</div>



</div>

`;



});




document.getElementById("totalWon").innerText=

"₩"+formatNumber(totalWon);



document.getElementById("totalTwd").innerText=

"NT$"+formatNumber(totalTwd);



}

async function exportExcel(){


const snapshot =
await window.firebaseFns.getDocs(

window.firebaseFns.collection(
window.db,
"expenses"
)

);


let arr=[];


snapshot.forEach((doc)=>{

arr.push({

id:doc.id,

...doc.data()

});

});


// 最新新增排最上面

arr.sort((a,b)=>{

if(!a.createdAt || !b.createdAt){

return 0;

}

return b.createdAt.seconds - a.createdAt.seconds;

});



let data = arr.map((item)=>({

"日期": item.date,

"添加時間":

item.createdAt

?

new Date(item.createdAt.seconds*1000)
.toLocaleString("zh-TW")

:

"",

"項目": item.item,

"韓幣": "₩"+Number(item.won).toLocaleString(),

"台幣換算": "NT$"+Number(item.twd).toLocaleString(),

"匯率": "₩"+(item.rate || 46)+" = NT$1",

"刷卡手續費":
"NT$"+Number(item.fee || 0).toLocaleString(),

"實際支出":
"NT$"+Number(item.totalTwd || item.twd).toLocaleString(),

"付款方式": item.payment,

"付款人": item.person,

"備註": item.note || ""

}));



let worksheet =
XLSX.utils.json_to_sheet(data);


let workbook =
XLSX.utils.book_new();


XLSX.utils.book_append_sheet(

workbook,

worksheet,

"旅費紀錄"

);


let excelBuffer = XLSX.write(workbook, {
    bookType: "xlsx",
    type: "array"
});


let blob = new Blob(
    [excelBuffer],
    {
        type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    }
);


let fileName = "2026釜山旅費紀錄.xlsx";
downloadExcel(blob,fileName);


}

function downloadExcel(blob,fileName){

    let fileURL = URL.createObjectURL(blob);

    let a = document.createElement("a");

    a.href = fileURL;

    a.download = fileName;

    document.body.appendChild(a);

    a.click();

    setTimeout(()=>{

        document.body.removeChild(a);

        URL.revokeObjectURL(fileURL);

    },1000);

}






</script>


</body>

</html>
