<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 2026釜山旅費紀錄</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');


body{
    font-family:'Noto Sans TC',sans-serif;
    background:#EAE6DF;
}


.travel-book{
    background:white;
    border-radius:24px;
    box-shadow:0 20px 45px rgba(50,45,40,.12);
}


.soft-card{
    background:white;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(50,45,40,.08);
}


.input-style{

    width:100%;
    margin-top:8px;
    padding:14px;
    background:#faf8f4;
    border-radius:14px;
    border:none;
    outline:none;

}


.input-style:focus{
    box-shadow:0 0 0 2px #d6cfc5;
}



.pay-btn{

    padding:14px;
    border-radius:14px;
    background:#f3f0eb;
    font-weight:700;

}


.selected{

    background:#292524;
    color:white;

}



.expense-card{

    background:#faf8f4;
    border-radius:18px;
    padding:18px;

}



.action-btn{

    font-size:13px;
    padding:6px 12px;
    border-radius:10px;
    background:#eee9e1;
    font-weight:bold;

}


</style>


</head>


<body class="text-stone-800 p-3 md:p-8">


<div class="max-w-4xl mx-auto travel-book min-h-screen">


<header class="bg-stone-100 py-10 text-center rounded-t-[24px]">

<h1 class="text-3xl font-black">

💰 2026釜山旅費紀錄

</h1>


<p class="text-sm text-stone-500 mt-2">

Busan Travel Expenses

</p>


</header>



<main class="p-6 md:p-10">


<section class="soft-card p-6 mb-6">


<h2 class="text-xl font-black mb-4">

💱 匯率設定

</h2>


<div class="flex gap-3">


<input

id="exchangeRate"

type="number"

step="0.1"

value="46"

class="input-style">

<p class="text-xs text-stone-400 mt-2">

🇹🇼 NT$1 = ₩多少韓元

</p>


<button

onclick="saveRate()"

class="bg-stone-800 text-white px-5 rounded-xl font-bold">

儲存

</button>


</div>


</section>



<section class="soft-card p-6 mb-6">


<h2 class="text-xl font-black mb-5">

📊 旅費總計

</h2>


<div class="grid grid-cols-2 gap-4">


<div class="bg-stone-50 rounded-2xl p-5">

<p class="text-xs text-stone-500">

🇰🇷 韓幣總額

</p>

<p id="totalWon" class="text-xl font-black mt-2">

₩0

</p>


</div>


<div class="bg-stone-50 rounded-2xl p-5">

<p class="text-xs text-stone-500">

🇹🇼 台幣約

</p>

<p id="totalTwd" class="text-xl font-black mt-2">

NT$0

</p>


</div>


</div>


</section>



<section class="soft-card p-6">


<h2 id="formTitle" class="text-xl font-black mb-5">

➕ 新增花費

</h2>


<input type="hidden" id="editId">



<div class="space-y-5">


<div>

<label class="font-bold text-sm">📅 日期</label>

<input id="date" type="date" class="input-style">

</div>


<div>

<label class="font-bold text-sm">📝 項目</label>

<input id="item" type="text" placeholder="例如：機場接送" class="input-style">

</div>


<div>

<label class="font-bold text-sm">🇰🇷 韓幣金額</label>

<input id="won" type="number" class="input-style">

<p id="previewTwd" class="text-sm text-stone-500 mt-2">

約 NT$0

</p>

<div class="mt-4">

<label class="font-bold text-sm">

💳 刷卡手續費（選填【等銀行出帳後填寫】）

</label>


<input

id="fee"

type="number"

placeholder="例如：20"

class="input-style">


</div>

</div>

<div>

<label class="font-bold text-sm">

💳 付款方式

</label>


<div class="grid grid-cols-2 gap-3 mt-2">


<button

id="cashBtn"

onclick="selectPayment('現金')"

class="pay-btn">

💵 現金

</button>



<button

id="cardBtn"

onclick="selectPayment('刷卡')"

class="pay-btn">

💳 刷卡

</button>


</div>

</div>




<div>

<label class="font-bold text-sm">

👤 付款人

</label>


<select id="person" class="input-style">

<option>阿翔</option>

<option>橘子</option>

<option>凱婷</option>

<option>蘇</option>

</select>


</div>






<button

id="submitBtn"

onclick="saveExpense()"

class="w-full bg-stone-800 text-white rounded-2xl p-4 font-bold">


＋ 新增紀錄


</button>



<button

id="cancelBtn"

onclick="cancelEdit()"

class="hidden w-full bg-stone-200 text-stone-700 rounded-2xl p-4 font-bold mt-3">


取消編輯


</button>



</div>


</section>






<section class="soft-card p-6 mt-6">


<div class="flex justify-between items-center mb-5">

<h2 class="text-xl font-black">

📒 花費紀錄

</h2>


<button

onclick="exportExcel()"

class="bg-stone-800 text-white px-4 py-2 rounded-xl text-sm font-bold">

📥 匯出 Excel

</button>


</div>


<div id="expenseList" class="space-y-3">


<p class="text-stone-400 text-sm">

目前還沒有紀錄

</p>


</div>


</section>



</main>





<footer class="bg-stone-100 py-4 text-center text-xs text-stone-400 font-bold rounded-b-[24px]">


⚠️ 溫馨提醒‼️ 是免稅！不是免費！！！🌝


</footer>


</div>








<script>


let paymentMethod="";

let exchangeRate=46;



function formatNumber(num){

return Number(num).toLocaleString("zh-TW");

}




let savedRate =
localStorage.getItem("busanRate");


if(savedRate){

exchangeRate =
Number(savedRate);

}





function saveRate(){


exchangeRate =

Number(

document.getElementById("exchangeRate").value

);


localStorage.setItem(
"busanRate",
exchangeRate
);


loadExpenses();


}






function selectPayment(method){


paymentMethod=method;



cashBtn.classList.remove("selected");

cardBtn.classList.remove("selected");



if(method==="現金")

cashBtn.classList.add("selected");



if(method==="刷卡")

cardBtn.classList.add("selected");



}







document.getElementById("won")

.addEventListener("input",()=>{


let won =
Number(document.getElementById("won").value)||0;



previewTwd.innerText =

"約 NT$"+

formatNumber(

Math.round(won/exchangeRate)

);


});







import("./firebase-config.js")

.then(async({db})=>{


window.db=db;



const {

collection,

addDoc,

getDocs,

doc,

updateDoc,

deleteDoc,

serverTimestamp

}=await import(

"https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js"

);



window.firebaseFns={

collection,

addDoc,

getDocs,

doc,

updateDoc,

deleteDoc,

serverTimestamp

};



loadExpenses();


});







async function saveExpense(){



let id =
document.getElementById("editId").value;



let feeAmount =
Number(document.getElementById("fee").value)||0;


let twdAmount =
Math.round(
Number(won.value)/exchangeRate
);



let data={


date:
date.value,


item:
item.value,


won:
Number(won.value),


twd:
twdAmount,


fee:
feeAmount,


totalTwd:
twdAmount + feeAmount,


payment:
paymentMethod,


person:
person.value


};





if(!data.item || !data.won){

alert("請輸入資料");

return;

}



if(!paymentMethod){

alert("請選付款方式");

return;

}


if(id){


await window.firebaseFns.updateDoc(

window.firebaseFns.doc(
window.db,
"expenses",
id
),

data

);


alert("修改完成");


}

else{


await window.firebaseFns.addDoc(

window.firebaseFns.collection(
window.db,
"expenses"
),

{

...data,

createdAt:
window.firebaseFns.serverTimestamp()

}

);


alert("新增完成");


}




clearForm();

loadExpenses();



}








function editExpense(data,id){



document.getElementById("editId").value=id;


document.getElementById("date").value=data.date;


document.getElementById("item").value=data.item;


document.getElementById("won").value=data.won;


document.getElementById("person").value=data.person;



paymentMethod=data.payment;



selectPayment(paymentMethod);



document.getElementById("formTitle").innerText=

"✏️ 編輯花費";


document.getElementById("submitBtn").innerText=

"更新紀錄";


document.getElementById("cancelBtn")

.classList.remove("hidden");



window.scrollTo({

top:0,

behavior:"smooth"

});


}







function cancelEdit(){


clearForm();


}





function clearForm(){


document.getElementById("editId").value="";


document.getElementById("item").value="";


document.getElementById("won").value="";


document.getElementById("formTitle").innerText=

"➕ 新增花費";


document.getElementById("submitBtn").innerText=

"＋ 新增紀錄";


document.getElementById("cancelBtn")

.classList.add("hidden");


paymentMethod="";


cashBtn.classList.remove("selected");

cardBtn.classList.remove("selected");


}








async function deleteExpense(id){



if(!confirm("確定要刪除此筆旅費嗎？"))

return;



await window.firebaseFns.deleteDoc(

window.firebaseFns.doc(

window.db,

"expenses",

id

)

);



loadExpenses();



}







async function loadExpenses(){



const list =
document.getElementById("expenseList");



list.innerHTML="";



let totalWon=0;



let snapshot=

await window.firebaseFns.getDocs(

window.firebaseFns.collection(

window.db,

"expenses"

)

);




let arr=[];



snapshot.forEach((d)=>{


arr.push({

id:d.id,

...d.data()

});


});



arr.sort(

(a,b)=>

new Date(b.date)-new Date(a.date)

);





arr.forEach((data)=>{


totalWon += Number(data.won);



list.innerHTML +=



`

<div class="expense-card">


<div class="flex justify-between">


<div>

<p class="font-black text-lg">

${data.item}

</p>


<p class="text-sm text-stone-500">

📅 ${data.date}

</p>


</div>



<div class="text-right">


<p class="font-black">

₩${formatNumber(data.won)}

</p>


<p class="text-sm text-stone-500">

NT$${formatNumber(data.twd)}

${data.fee ? 
`
<p class="text-sm text-stone-500">
💳 手續費 NT$${formatNumber(data.fee)}
</p>

<p class="text-sm font-bold">
實際 NT$${formatNumber(data.totalTwd || data.twd)}
</p>
`
:
""
}

</p>


</div>



</div>




<div class="mt-3 text-sm text-stone-600">

${data.payment}

｜👤 ${data.person}

</div>




<div class="flex gap-2 mt-4">


<button

onclick='editExpense(${JSON.stringify(data)}, "${data.id}")'

class="action-btn">

✏️ 編輯

</button>



<button

onclick="deleteExpense('${data.id}')"

class="action-btn">

🗑 刪除

</button>



</div>



</div>

`;



});




document.getElementById("totalWon").innerText=

"₩"+formatNumber(totalWon);



document.getElementById("totalTwd").innerText=

"NT$"+formatNumber(

Math.round(totalWon/exchangeRate)

);



}


async function exportExcel(){


const snapshot =

await window.firebaseFns.getDocs(

window.firebaseFns.collection(

window.db,

"expenses"

)

);



let rows = [];


rows.push([

"日期",

"項目",

"韓幣",

"台幣換算",

"刷卡手續費",

"實際支出",

"付款方式",

"付款人"

]);




snapshot.forEach((doc)=>{


let data = doc.data();


rows.push([

data.date,

data.item,

"₩" + Number(data.won).toLocaleString(),

"NT$" + Number(data.twd).toLocaleString(),

"NT$" + Number(data.fee || 0).toLocaleString(),

"NT$" + Number(data.totalTwd || data.twd).toLocaleString(),

data.payment,

data.person

]);


});





let csv =
rows
.map(row =>
row.map(item => `"${item}"`).join(",")
)
.join("\n");





let blob = new Blob(

[

"\ufeff"+csv

],

{

type:"text/csv;charset=utf-8;"

}

);




let link = document.createElement("a");



link.href = URL.createObjectURL(blob);



link.download =

"2026釜山旅費紀錄.csv";



link.click();



}



</script>


</body>

</html>
