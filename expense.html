<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 2026釜山旅費紀錄</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');


body{
    font-family:'Noto Sans TC',sans-serif;
    background:#EAE6DF;
}


.travel-book{
    background:white;
    border-radius:24px;
    box-shadow:0 20px 45px rgba(50,45,40,.12);
}


.soft-card{
    background:white;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(50,45,40,.08);
}


.input-style{

    width:100%;
    margin-top:8px;
    padding:14px;

    background:#faf8f4;

    border-radius:14px;

    border:none;

    outline:none;

}


.input-style:focus{

    box-shadow:0 0 0 2px #d6cfc5;

}



.pay-btn{

    padding:14px;

    border-radius:14px;

    background:#f3f0eb;

    font-weight:700;

}



.selected{

    background:#292524;

    color:white;

}



.expense-card{

    background:#faf8f4;

    border-radius:18px;

    padding:18px;

}



</style>

</head>



<body class="text-stone-800 p-3 md:p-8">


<div class="max-w-4xl mx-auto travel-book min-h-screen">



<header class="bg-stone-100 py-10 text-center rounded-t-[24px]">


<h1 class="text-3xl font-black">

💰 2026釜山旅費紀錄

</h1>


<p class="text-sm text-stone-500 mt-2">

Busan Travel Expenses

</p>


</header>





<main class="p-6 md:p-10">





<section class="soft-card p-6 mb-6">


<h2 class="text-xl font-black mb-4">

💱 匯率設定

</h2>


<div class="flex gap-3 items-center">


<input

id="exchangeRate"

type="number"

step="0.001"

value="0.024"

class="input-style mt-0">


<button

onclick="saveRate()"

class="bg-stone-800 text-white px-5 rounded-xl font-bold">

儲存

</button>


</div>


<p class="text-xs text-stone-400 mt-2">

例如：1韓元 = 0.024台幣

</p>


</section>







<section class="soft-card p-6 mb-6">


<h2 class="text-xl font-black mb-5">

📊 旅費總計

</h2>



<div class="grid grid-cols-2 gap-4">



<div class="bg-stone-50 rounded-2xl p-5">


<p class="text-xs text-stone-500">

🇰🇷 韓幣總額

</p>


<p id="totalWon"

class="text-xl font-black mt-2">

₩0

</p>


</div>





<div class="bg-stone-50 rounded-2xl p-5">


<p class="text-xs text-stone-500">

🇹🇼 台幣約

</p>


<p id="totalTwd"

class="text-xl font-black mt-2">

NT$0

</p>


</div>



</div>



</section>






<section class="soft-card p-6">


<h2 class="text-xl font-black mb-5">

➕ 新增花費

</h2>



<div class="space-y-5">



<div>

<label class="font-bold text-sm">

📅 日期

</label>


<input

id="date"

type="date"

class="input-style">


</div>





<div>

<label class="font-bold text-sm">

📝 項目

</label>


<input

id="item"

type="text"

placeholder="例如：機場接送"

class="input-style">


</div>





<div>

<label class="font-bold text-sm">

🇰🇷 韓幣金額

</label>


<input

id="won"

type="number"

placeholder="例如：7500"

class="input-style">


<p id="previewTwd"

class="text-sm text-stone-500 mt-2">

約 NT$0

</p>


</div>

<div>

<label class="font-bold text-sm">

💳 付款方式

</label>


<div class="grid grid-cols-2 gap-3 mt-2">


<button

id="cashBtn"

onclick="selectPayment('現金')"

class="pay-btn">

💵 現金

</button>



<button

id="cardBtn"

onclick="selectPayment('刷卡')"

class="pay-btn">

💳 刷卡

</button>



</div>


</div>





<div>


<label class="font-bold text-sm">

👤 付款人

</label>



<select

id="person"

class="input-style">


<option>阿翔</option>

<option>橘子</option>

<option>凱婷</option>

<option>蘇</option>


</select>


</div>






<button

onclick="addExpense()"

class="w-full bg-stone-800 text-white rounded-2xl p-4 font-bold">


＋ 新增紀錄


</button>



</div>


</section>







<section class="soft-card p-6 mt-6">


<h2 class="text-xl font-black mb-5">

📒 花費紀錄

</h2>


<div

id="expenseList"

class="space-y-3">


<p class="text-stone-400 text-sm">

目前還沒有紀錄

</p>


</div>


</section>





</main>







<footer

class="bg-stone-100 py-4 text-center text-xs text-stone-400 font-bold rounded-b-[24px]">


⚠️ 溫馨提醒‼️ 是免稅！不是免費！！！🛍️


</footer>




</div>








<script>


let paymentMethod="";

let exchangeRate=0.024;





function formatNumber(num){

return Number(num).toLocaleString("zh-TW");

}







function saveRate(){


exchangeRate =
Number(
document.getElementById("exchangeRate").value
);



localStorage.setItem(
"busanRate",
exchangeRate
);



alert("匯率更新完成");


loadExpenses();


}







function selectPayment(method){


paymentMethod=method;



document
.getElementById("cashBtn")
.classList.remove("selected");



document
.getElementById("cardBtn")
.classList.remove("selected");





if(method==="現金"){


document
.getElementById("cashBtn")
.classList.add("selected");


}



if(method==="刷卡"){


document
.getElementById("cardBtn")
.classList.add("selected");


}


}







document

.getElementById("won")

.addEventListener(

"input",

function(){


let won =
Number(this.value)||0;



document

.getElementById("previewTwd")

.innerText =

"約 NT$" +

formatNumber(
Math.round(
won*exchangeRate
)
);


}

);







let savedRate =
localStorage.getItem("busanRate");



if(savedRate){


exchangeRate =
Number(savedRate);



document.getElementById("exchangeRate").value =
exchangeRate;


}






</script>








<script type="module">


import { db }

from "./firebase-config.js";



import {


collection,

addDoc,

getDocs,

serverTimestamp


}

from

"https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";







window.addExpense = async function(){



let date =
document.getElementById("date").value;



let item =
document.getElementById("item").value;



let won =
Number(
document.getElementById("won").value
);



let person =
document.getElementById("person").value;






if(!item || !won){


alert("請輸入項目和金額");

return;


}



if(!paymentMethod){


alert("請選擇付款方式");

return;


}







await addDoc(

collection(db,"expenses"),

{


date,

item,

won,


twd:

Math.round(
won*exchangeRate
),


payment:

paymentMethod,


person,


createdAt:

serverTimestamp()


}


);



alert("新增成功");



document.getElementById("item").value="";

document.getElementById("won").value="";



loadExpenses();



}
async function loadExpenses(){


const list =

document.getElementById("expenseList");



list.innerHTML="";



let totalWon = 0;



let snapshot =

await getDocs(

collection(db,"expenses")

);





let expenses=[];



snapshot.forEach((doc)=>{


let data=doc.data();


expenses.push(data);



});





expenses.sort(

(a,b)=>

new Date(b.date)

-

new Date(a.date)

);







if(expenses.length===0){


list.innerHTML=

`

<p class="text-stone-400 text-sm">

目前還沒有紀錄

</p>

`;



document.getElementById("totalWon").innerText="₩0";

document.getElementById("totalTwd").innerText="NT$0";


return;


}







expenses.forEach((data)=>{



totalWon += Number(data.won);



list.innerHTML +=



`

<div class="expense-card">


<div class="flex justify-between">


<div>


<p class="font-black text-lg">

${data.item}

</p>


<p class="text-sm text-stone-500 mt-1">

📅 ${data.date}

</p>


</div>





<div class="text-right">


<p class="font-black">

₩${formatNumber(data.won)}

</p>


<p class="text-sm text-stone-500">

NT$${formatNumber(

data.twd ||

Math.round(data.won*exchangeRate)

)}

</p>


</div>



</div>




<div class="mt-3 text-sm text-stone-600">


${data.payment}

｜

👤 ${data.person}


</div>



</div>


`;



});








document

.getElementById("totalWon")

.innerText =

"₩" +

formatNumber(totalWon);






document

.getElementById("totalTwd")

.innerText =

"NT$" +

formatNumber(

Math.round(

totalWon * exchangeRate

)

);




}






loadExpenses();



</script>


</body>

</html>
