<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 2026釜山旅費紀錄</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

body {
    font-family:'Noto Sans TC',sans-serif;
    background-color:#EAE6DF;
}

.travel-book{
    background:white;
    border-radius:4px;
    box-shadow:0 15px 35px rgba(50,45,40,.15);
}

</style>

</head>


<body class="text-stone-800 p-3 md:p-8">


<div class="max-w-4xl mx-auto travel-book min-h-screen">


<header class="bg-stone-100 py-8 text-center border-b">

<h1 class="text-3xl font-black">
💰 2026釜山旅費紀錄
</h1>

<p class="text-sm text-stone-500 mt-2">
Busan Travel Expenses
</p>

</header>



<main class="p-6 md:p-10">


<section class="bg-stone-50 rounded-xl border p-6">


<!-- 總計 -->

<div class="bg-white rounded-xl border p-5 mb-6">

<h2 class="text-xl font-black mb-4">
📊 旅費總計
</h2>


<div class="grid grid-cols-2 gap-4 text-center">


<div class="bg-stone-50 rounded-lg p-4">

<p class="text-xs text-stone-500">
韓幣總額
</p>

<p class="text-xl font-black">
₩ 0
</p>

</div>



<div class="bg-stone-50 rounded-lg p-4">

<p class="text-xs text-stone-500">
台幣約
</p>

<p class="text-xl font-black">
NT$ 0
</p>

</div>


</div>

</div>





<!-- 新增花費 -->

<div class="bg-white rounded-xl border p-5">


<h2 class="text-xl font-black mb-5">
➕ 新增花費
</h2>



<div class="space-y-4">



<div>

<label class="font-bold text-sm">
📅 日期
</label>

<input id="date"
type="date"
class="w-full mt-2 p-3 border rounded-lg">

</div>




<div>

<label class="font-bold text-sm">
📝 項目
</label>

<input id="item"
type="text"
placeholder="例如：機場接送"
class="w-full mt-2 p-3 border rounded-lg">

</div>




<div>

<label class="font-bold text-sm">
🇰🇷 韓幣金額 ₩
</label>

<input id="won"
type="number"
placeholder="例如：7500"
class="w-full mt-2 p-3 border rounded-lg">

</div>




<div>

<label class="font-bold text-sm">
💳 付款方式
</label>


<div class="grid grid-cols-2 gap-3 mt-2">


<button 
id="cashBtn"
onclick="selectPayment('現金')"
class="border rounded-lg p-3">

💵 現金

</button>



<button 
id="cardBtn"
onclick="selectPayment('刷卡')"
class="border rounded-lg p-3">

💳 刷卡

</button>


</div>

</div>




<div>

<label class="font-bold text-sm">
👤 付款人
</label>


<select id="person"
class="w-full mt-2 p-3 border rounded-lg">


<option>阿翔</option>
<option>橘子</option>
<option>凱婷</option>
<option>蘇</option>


</select>


</div>




<button

onclick="addExpense()"

class="w-full bg-stone-800 text-white rounded-lg p-3 font-bold">

＋ 新增紀錄

</button>

<section class="bg-white rounded-xl border p-5 mt-6">

<h2 class="text-xl font-black mb-5">
📒 花費紀錄
</h2>

<div id="expenseList" class="space-y-3">

<p class="text-stone-400 text-sm">
目前還沒有紀錄
</p>

</div>

</section>



</div>


</div>


</section>


</main>





<footer class="bg-stone-100 py-4 text-center text-xs text-stone-400 font-bold">

⚠️溫馨提醒‼️是免稅！不是免費！！！🫪 

</footer>



</div>



<script>

let paymentMethod = "";


function selectPayment(method){

paymentMethod = method;


document.getElementById("cashBtn")
.classList.remove("bg-stone-800","text-white");


document.getElementById("cardBtn")
.classList.remove("bg-stone-800","text-white");



if(method==="現金"){

document.getElementById("cashBtn")
.classList.add("bg-stone-800","text-white");

}



if(method==="刷卡"){

document.getElementById("cardBtn")
.classList.add("bg-stone-800","text-white");

}


}




function addExpense(){


alert(
"新增紀錄測試成功！\n\n"+
"項目："+document.getElementById("item").value+
"\n金額："+document.getElementById("won").value+
"\n付款："+paymentMethod
);


}


</script>


<script type="module">

import { db } from "./firebase-config.js";

import { 
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";



window.addExpense = async function(){


let date =
document.getElementById("date").value;


let item =
document.getElementById("item").value;


let won =
document.getElementById("won").value;


let person =
document.getElementById("person").value;



if(!item || !won){

alert("請輸入項目和金額");

return;

}



try{


await addDoc(collection(db,"expenses"),{


date: date,

item: item,

won: Number(won),

payment: paymentMethod,

person: person,

createdAt: new Date()


});



alert("旅費新增成功！");


}


catch(error){


console.error(error);

alert("新增失敗");


}


}



</script>
</body>

</html>
