<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 2026釜山旅費紀錄</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

body {
    font-family: 'Noto Sans TC', sans-serif;
    background-color:#EAE6DF;
}

.travel-book {
    background:white;
    border-radius:4px;
    box-shadow:0 15px 35px rgba(50,45,40,.15);
}
</style>

</head>


<body class="text-stone-800 p-3 md:p-8">


<div class="max-w-4xl mx-auto travel-book min-h-screen">


<header class="bg-stone-100 py-8 text-center border-b">

<h1 class="text-3xl font-black">
💰 2026釜山旅費紀錄
</h1>

<p class="text-sm text-stone-500 mt-2">
Busan Travel Expenses
</p>

</header>



<main class="p-6 md:p-10">


<section class="bg-stone-50 rounded-xl border p-6">


<!-- 總計 -->

<div class="bg-white rounded-xl border p-5 mb-6">

<h2 class="text-xl font-black mb-4">
📊 旅費總計
</h2>


<div class="grid grid-cols-2 gap-4 text-center">


<div class="bg-stone-50 rounded-lg p-4">

<p class="text-xs text-stone-500">
韓幣總額
</p>

<p class="text-xl font-black mt-2">
₩ 0
</p>

</div>



<div class="bg-stone-50 rounded-lg p-4">

<p class="text-xs text-stone-500">
台幣約
</p>

<p class="text-xl font-black mt-2">
NT$ 0
</p>

</div>


</div>

</div>




<!-- 新增花費 -->

<div class="bg-white rounded-xl border p-5">


<h2 class="text-xl font-black mb-5">
➕ 新增花費
</h2>



<div class="space-y-4">



<div>

<label class="font-bold text-sm">
📅 日期
</label>

<input type="date"
class="w-full mt-2 p-3 border rounded-lg">

</div>




<div>

<label class="font-bold text-sm">
📝 項目
</label>

<input type="text"
placeholder="例如：機場接送"
class="w-full mt-2 p-3 border rounded-lg">

</div>




<div>

<label class="font-bold text-sm">
🇰🇷 韓幣金額 ₩
</label>

<input type="number"
placeholder="例如：7500"
class="w-full mt-2 p-3 border rounded-lg">

</div>




<div>

<label class="font-bold text-sm">
💳 付款方式
</label>


<div class="grid grid-cols-2 gap-3 mt-2">

<button class="border rounded-lg p-3">
💵 現金
</button>


<button class="border rounded-lg p-3">
💳 刷卡
</button>


</div>

</div>




<div>

<label class="font-bold text-sm">
👤 付款人
</label>


<select class="w-full mt-2 p-3 border rounded-lg">

<option>阿翔</option>
<option>橘子</option>
<option>凱婷</option>
<option>蘇</option>

</select>


</div>




<button class="w-full bg-stone-800 text-white rounded-lg p-3 font-bold">

＋ 新增紀錄

</button>



</div>


</div>


</section>


</main>




<footer class="bg-stone-100 py-4 text-center text-xs text-stone-400 font-bold">

祝大家玩得超開心！安全第一 ✈️🌊

</footer>


</div>


</body>

</html>
